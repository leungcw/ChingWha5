# 通用人类写作模式种子

> 范文库为空时的 fallback 种子库，提供基础的写作模式参考。
> 当用户积累了个人范文库后，此文件中的种子将被替换。

---

## opening_hooks（开头钩子）

### hook_1: 场景还原式

```text
{具体时间}，{具体地点}，{具体人物}正在{具体动作}。

例：凌晨两点，张磊的办公室只剩一盏灯。屏幕上的代码已经改了第17版。
```

**适用框架**：A痛点型、B故事型、G复盘/体验型
**情绪方向**：中性偏负（制造代入感）
**信息密度**：中

### hook_2: 数据冲击式

```text
{具体数字}%的{人群}{做某事/有某结果}。

例：87%的职场人承认，他们每天至少有2小时在做无意义的事。
```

**适用框架**：A痛点型、C清单型、D对比型
**情绪方向**：弱负（引发警觉）
**信息密度**：高

### hook_3: 反常识式

```text
你以为{常识判断}？{反常识事实}。

例：你以为早起的人更成功？数据显示，夜猫子的收入平均高出12%。
```

**适用框架**：A痛点型、D对比型、F纯观点型
**情绪方向**：弱正（制造好奇）
**信息密度**：中高

### hook_4: 悬念倒叙式

```text
{结果/现状}。但{时间}前，{反差状态}。

例：现在他年薪百万，带30人团队。但三年前，他还在出租屋里啃泡面。
```

**适用框架**：B故事型、G复盘/体验型
**情绪方向**：中性（制造好奇）
**信息密度**：中

---

## emotional_peaks（情绪峰值）

### peak_1: 顿悟时刻

```text
那一刻我突然明白了——{核心洞察}。

例：那一刻我突然明白了——我不是不擅长社交，我只是在用错误的方式社交。
```

**触发条件**：故事转折后、分析深入后
**位置**：文章60-75%处
**情绪方向**：弱正→中正
**配合动作**：前1段降低信息密度，后1段给出具体行动建议

### peak_2: 直击痛点

```text
说到底，{痛点本质}。不是{表面原因}，是{深层原因}。

例：说到底，你不是缺时间，你缺的是优先级。不是时间不够，是重要的事排在后面。
```

**触发条件**：原因剖析段核心
**位置**：文章40-50%处
**情绪方向**：强负→弱正（先痛后释）
**配合动作**：后1段紧跟解决方案

### peak_3: 价值升华

```text
{表面价值}背后，真正重要的是{深层价值}。

例：效率工具背后，真正重要的不是省了多少时间，是你把省下的时间花在了哪里。
```

**触发条件**：结尾升华段
**位置**：文章85-95%处
**情绪方向**：中正→强正
**配合动作**：紧跟CTA

---

## transitions（过渡技巧）

### transition_1: 问题桥接

```text
{当前段结论}。但问题是——{下一段主题}。

例：方法说完了。但问题是，知道了和做到了之间，还差什么？
```

**适用**：清单项之间、分析→解决方案
**效果**：制造好奇心缺口

### transition_2: 场景切换

```text
换个场景看。{新场景描述}。

例：换个场景看。同样的策略，放在B2B领域，完全是另一个故事。
```

**适用**：维度切换、视角转换
**效果**：自然跳转，不突兀

### transition_3: 回马枪

```text
说到{当前话题}，我突然想起{关联话题}。

例：说到时间管理，我突然想起一个反直觉的发现——越是管理时间，越焦虑。
```

**适用**：话题关联、意外引入
**效果**：制造意外感，增加阅读趣味

---

## closings（结尾模式）

### closing_1: 行动号召式

```text
{核心行动}。{行动门槛}，{预期效果}。

例：今天试一个，5分钟就够。一周后你会感谢自己。
```

**适用框架**：A痛点型、C清单型、G复盘/体验型
**情绪方向**：弱正
**CTA强度**：强

### closing_2: 反问留白式

```text
{核心问题}？{不给答案/给暗示}。

例：下一次面对选择，你还会犹豫吗？答案，你可能已经知道了。
```

**适用框架**：D对比型、F纯观点型
**情绪方向**：中性
**CTA强度**：中

### closing_3: 升华收束式

```text
{表面主题}的本质是{深层主题}。{价值判断}。

例：说到底，所有的方法都是工具。真正重要的是，你愿不愿意迈出第一步。
```

**适用框架**：A痛点型、E热点解读、F纯观点型
**情绪方向**：强正
**CTA强度**：弱

### closing_4: 首尾呼应式

```text
回到开头——{重述开头的场景/问题}。现在，{新的理解/状态}。

例：回到开头那个凌晨两点的办公室。如果重来，我不会再改第17版——我会先问一句：这个需求真的存在吗？
```

**适用框架**：B故事型、G复盘/体验型
**情绪方向**：中正
**CTA强度**：中

---

## 种子使用规则

```yaml
seed_usage:
  priority: "user_corpus > exemplar_seeds"
  fallback_condition: "用户范文库为空或不足5篇"

  usage_rules:
    - "种子不是模板，是模式参考"
    - "必须根据具体话题和人格调整措辞"
    - "不允许直接复制种子文本"
    - "种子的结构模式可以复用，具体内容必须原创"

  replacement_rule:
    - "当用户范文库≥5篇时，自动从范文库提取模式"
    - "提取的模式替换对应种子"
    - "保留未被覆盖的种子作为补充"
```
